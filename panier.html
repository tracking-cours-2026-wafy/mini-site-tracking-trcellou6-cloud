<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiblioTech — Panier</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Colle ton conteneur GTM ici (cf. index.html) -->

  <!-- dataLayer initial : view_cart -->
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: "view_cart",
      page_type: "cart",
      ecommerce: {
        currency: "EUR",
        value: 29.90,
        items: [{
          item_id: "BOOK-001",
          item_name: "Web Analytics pour débutants",
          item_category: "Livres",
          item_brand: "BiblioTech",
          price: 29.90,
          quantity: 1
        }]
      }
    });
  </script>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">BiblioTech</a>
    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="produit.html">Produit</a>
      <a href="panier.html" class="active">Panier</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="cart">
      <h1>Ton panier</h1>

      <div class="cart-item">
        <div class="cart-item-cover">WA</div>
        <div class="cart-item-info">
          <h3>Web Analytics pour débutants</h3>
          <p class="muted">Quantité : 1</p>
        </div>
        <p class="cart-item-price">29,90 €</p>
      </div>

      <div class="cart-summary">
        <div class="line"><span>Sous-total</span><span>29,90 €</span></div>
        <div class="line"><span>Livraison</span><span>Gratuite</span></div>
        <div class="line total"><span>Total</span><span>29,90 €</span></div>

        <!-- Bouton checkout : déclenche begin_checkout puis redirige -->
        <button
          id="checkout-btn"
          class="btn btn-primary"
          data-cart-value="29.90"
        >
          Valider la commande
        </button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© BiblioTech — Site pédagogique pour le cours Web Analytics</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
