<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiblioTech — Contact</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Colle ton conteneur GTM ici (cf. index.html) -->

  <!-- dataLayer initial : page_view -->
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: "page_view",
      page_type: "contact",
      page_title: "Contact",
    });
  </script>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">BiblioTech</a>
    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="produit.html">Produit</a>
      <a href="panier.html">Panier</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="contact">
      <h1>Contacte-nous</h1>
      <p class="lede">Une question ? Écris-nous, on répond sous 24h.</p>

      <form id="contact-form" class="form" novalidate>
        <label>
          <span>Nom</span>
          <input type="text" name="nom" required />
        </label>

        <label>
          <span>Email</span>
          <input type="email" name="email" required />
        </label>

        <label>
          <span>Sujet</span>
          <select name="sujet" required>
            <option value="">— Choisis un sujet —</option>
            <option value="commande">Question sur ma commande</option>
            <option value="produit">Question sur un produit</option>
            <option value="autre">Autre</option>
          </select>
        </label>

        <label>
          <span>Message</span>
          <textarea name="message" rows="5" required></textarea>
        </label>

        <button type="submit" class="btn btn-primary">Envoyer</button>

        <p id="form-success" class="form-success" hidden>
          ✓ Message envoyé, merci !
        </p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© BiblioTech — Site pédagogique pour le cours Web Analytics</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
